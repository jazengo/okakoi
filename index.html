/* -----------------------------
 プレイヤー入室
----------------------------- */

function listenPlayers(){

 const playersRef = ref(db,"rooms/"+roomId+"/players")

 onValue(playersRef, async snap => {

  const players = snap.val() || {}
  const ids = Object.values(players)

  /* 一度でもプレイヤーが入ったか記録 */
  if(ids.length > 0){
   playersEverJoined = true
  }

  /* プレイヤー0人になったらルーム削除 */
  if(playersEverJoined && ids.length === 0){
   console.log("プレイヤー0人 → ルーム削除")
   remove(ref(db,"rooms/"+roomId))
   return
  }

  /* p1入室 */
  if(!players.p1){

   await set(ref(db,"rooms/"+roomId+"/players/p1"),playerId)

   playerNumber = 1

   onDisconnect(ref(db,"rooms/"+roomId+"/players/p1")).remove()

   console.log("p1入室")

  }

  /* p2入室 */
  else if(!players.p2 && players.p1 !== playerId){

   await set(ref(db,"rooms/"+roomId+"/players/p2"),playerId)

   playerNumber = 2

   onDisconnect(ref(db,"rooms/"+roomId+"/players/p2")).remove()

   console.log("p2入室")

  }

  if(players.p1 === playerId) playerNumber = 1
  if(players.p2 === playerId) playerNumber = 2

  if(playerNumber){
   renderHand()
   updatePlayerSide()
  }

  if(players.p1 && players.p2 && playerNumber === 1){

   const stateSnap = await get(ref(db,"rooms/"+roomId+"/state"))

   if(!stateSnap.exists()){
    tryStartGame()
   }

  }

 })

}
/* -----------------------------
 ゲーム開始
----------------------------- */

async function tryStartGame(){

 const snap = await get(ref(db,"rooms/"+roomId+"/state"))

 if(snap.exists()) return
 if(playerNumber!==1) return

const buildDeck = createBuildDeck()
const floodDeck = createFloodDeck()

const newState={

 phase:"build",
 started:true,
 districts:createDistricts(),
 hands:createHands(buildDeck),

 buildDeck:buildDeck,
 floodDeck:floodDeck,

 floodedDistricts:[],
 floodHistory:{p1:[],p2:[]},

 currentPlayer:1,
 round:1,
/* 岸をランダムに決定 */
 sideOrder: Math.random()<0.5 ? ["p1","p2"] : ["p2","p1"],

 currentSide: null

}
newState.currentSide = newState.sideOrder[0]

 console.log("ゲーム開始", newState)
 set(ref(db,"rooms/"+roomId+"/state"),newState).then(()=>{
 console.log("state saved")
})

 
}

/* -----------------------------
 state同期
----------------------------- */

let lastPhase = null  // ★ フェーズ変化検知用（外に置く）

function listenState(){

  const stateRef = ref(db,"rooms/"+roomId+"/state")

  onValue(stateRef,(snap)=>{
    const s = snap.val()
    if(!s) return

    state = s

    // ===== ① 描画 =====
    renderHand()
    updatePlayerSide()
    renderLogs()
    drawBoard()

    // ===== ② 洪水フェーズ突入時 =====
    if(s.phase === "flood" && lastPhase !== "flood"){
      runFloodPhase()
    }

    // ===== ③ 義援金フェーズ突入時 =====
    if(s.phase === "relief" && lastPhase !== "relief"){
      checkRelief()
    }

    // ===== ④ 義援金終了時 =====
    if(state.phase !== "relief"){
      document.querySelector(".reliefBox")?.remove()
      document.querySelector(".reliefWait")?.remove()
    }

    // ===== ⑤ フェーズ記録 =====
    lastPhase = s.phase

  })
}

/* -----------------------------

----------------------------- */

function createDistricts(){

 const arr=[]

 for(let i=0;i<DISTRICTS;i++){
  arr.push({p1:[],p2:[]})
 }

 return arr
}

function createBuildDeck(){

 const deck=[]

 function add(name,point,count){
  for(let i=0;i<count;i++){
   deck.push({name,point})
  }
 }

 add("ハザードマップ",1,24)
 add("水門",2,18)
 add("堤防",3,13)
 add("ダム",4,8)

 deck.sort(()=>Math.random()-0.5)

 return deck
}

function createFloodDeck(){

 const deck=[]

 for(let i=0;i<DISTRICTS;i++){
  deck.push({district:i})
 }

 deck.sort(()=>Math.random()-0.5)

 return deck
}



function drawFlood(deck){
 return deck.pop()
}

function drawVillage(){
 return {name:"集落",point:0}
}



function createHands(buildDeck){

 const hands=[[],[]]

 for(let p=0;p<2;p++){
 // 初期建設手札補充
  for(let i=0;i<3;i++)
hands[p].push(drawBuild(buildDeck))
// 初期集落手札補充
  for(let i=0;i<3;i++)
   hands[p].push(drawVillage())

 }

 return hands
}

function drawBuild(deck){
 return deck.pop()
}

/* -----------------------------
 スコア
----------------------------- */

function score(cards){

 if(!Array.isArray(cards)) return 0

 return cards.reduce((a,c)=>a+(c?.point||0),0)

}

/* 大洪水判定 */
function hasThreeConsecutive(arr){

  console.log("大洪水チェック")

  // null / undefined 対策
  if(!arr) return false

  // 配列じゃなければ配列化
  if(!Array.isArray(arr)){
    arr = Object.values(arr)
  }

  // ★ 数字だけにする（超重要）
  arr = arr.filter(v => typeof v === "number")

  // 要素が足りない場合
  if(arr.length < 3) return false

  // ソート
  const sorted = [...arr].sort((a,b)=>a-b)

  for(let j=0;j<sorted.length-2;j++){
    if(
      sorted[j]+1 === sorted[j+1] &&
      sorted[j]+2 === sorted[j+2]
    ){
      return [sorted[j], sorted[j+1], sorted[j+2]]
    }
  }

  return false
}

if(!state.hands) return

 handDiv.innerHTML=""

/* -----------------------------
 カード配置
----------------------------- */
function build(i){
if(actionLock){
 console.log("処理中")
 return
}


 console.log("build start")

if(state.floodedDistricts && state.floodedDistricts.includes(i)){
 console.log("洪水判定済み地区には建設できない")
 return
}


 if(!state){
  console.log("stateなし")
  return
 }

 if(state.phase !== "build"){
  console.log("建設フェーズではない")
  return
 }

 if(playerNumber !== state.currentPlayer){
  console.log("自分のターンではない")
  return
 }

 if(selectedCard === null){
  console.log("カード未選択")
  return
 }

 /* stateコピー */
 actionLock = true
 const newState = JSON.parse(JSON.stringify(state))


 

 /* districts安全化 */
 let districts = newState.districts || []

if(!Array.isArray(districts)){
 const arr = []
 Object.keys(districts).forEach(k=>{
  arr[Number(k)] = districts[k]
 })
 districts = arr
}
 while(districts.length < DISTRICTS){
  districts.push({p1:[],p2:[]})
 }

 newState.districts = districts

 /* hands安全化 */
 let hands = newState.hands

 if(!Array.isArray(hands)){
  hands = Object.values(hands)
 }

 newState.hands = hands

 const hand = newState.hands[playerNumber-1]

 if(!hand){
  console.log("手札なし")
  return
 }

 if(selectedCard >= hand.length){
  console.log("手札indexエラー")
  return
 }

 /* カード取得 */
 const card = hand.splice(selectedCard,1)[0]

 if(!card){
  console.log("カード取得失敗")
  return
 }

 /* 手札を戻す（重要） */
 newState.hands[playerNumber-1] = hand

 /* district準備 */
 if(!newState.districts[i]){
  newState.districts[i] = {p1:[],p2:[]}
 }

 if(!newState.districts[i].p1) newState.districts[i].p1=[]
 if(!newState.districts[i].p2) newState.districts[i].p2=[]

 /* 配置 */
const side = state.sideOrder[playerNumber-1]

 newState.districts[i][side].push(card)

 console.log("カード配置",card)

/* 配置したカードの強調 */
newState.lastBuild = i
newState.lastBuildSide = side
 /* 手札チェック */
let handsCheck = newState.hands

if(!Array.isArray(handsCheck)){
 handsCheck = Object.values(handsCheck)
}

const hand1 = handsCheck[0] || []
const hand2 = handsCheck[1] || []

 console.log("hand1",hand1.length)
 console.log("hand2",hand2.length)

 if(hand1.length===0 && hand2.length===0){
  console.log("洪水フェーズ開始")
  // ★ 後攻プレイヤーを保存
  newState.lastPlayer = state.currentPlayer

  newState.phase="flood"
 }

 /* ターン交代 */
// ★ 次プレイヤー決定
const myIndex = playerNumber - 1
const enemyIndex = myIndex === 0 ? 1 : 0

const myHand = newState.hands[myIndex] || []
const enemyHand = newState.hands[enemyIndex] || []

// 両方0 → フェーズ終了
if(myHand.length === 0 && enemyHand.length === 0){
  newState.phase = "flood"
}
// 相手が0 → 自分続行
else if(enemyHand.length === 0){
  newState.currentPlayer = playerNumber
}
// 自分が0 → 相手続行
else if(myHand.length === 0){
  newState.currentPlayer = enemyIndex + 1
}
// 両方ある → 交代
else{
  newState.currentPlayer = enemyIndex + 1
}

selectedCard = null

 /* Firebase保存 */
set(ref(db,"rooms/"+roomId+"/state"),newState).then(()=>{
 actionLock = false
})
}

/* =========================
   義援金システム
========================= */

function checkRelief(){

 if(!state.relief || state.reliefDone) return   // ←これ追加

  const mySide = state.sideOrder[playerNumber-1]

  // 自分じゃない → 待機表示
  if(state.relief !== mySide){
    showWaitingMessage()
    return
  }

  // 自分 → 選択UI
  showReliefChoice()
}

function showReliefChoice(){
const mySide = state.sideOrder[playerNumber-1]

if(state.reliefPlayer !== mySide){
  return
}
  if(document.querySelector(".reliefBox")) return
  console.log("義援金UI呼ばれた")

  document.querySelector(".reliefBox")?.remove()
  document.querySelector(".reliefOverlay")?.remove()

  const overlay = document.createElement("div")
overlay.className = "reliefOverlay"

  overlay.style.position = "fixed"
  overlay.style.top = "0"
  overlay.style.left = "0"
  overlay.style.width = "100%"
  overlay.style.height = "100%"
  overlay.style.background = "rgba(0,0,0,0.6)"
  overlay.style.zIndex = "9998"

  const box = document.createElement("div")
  box.className = "reliefBox"    

  // ★完全に強制表示
  box.style.position = "fixed"
  box.style.top = "50%"
  box.style.left = "50%"
  box.style.transform = "translate(-50%, -50%)"
  box.style.background = "white"
  box.style.padding = "20px"
  box.style.borderRadius = "10px"
  box.style.zIndex = "9999"
  box.style.width = "300px"

  box.innerHTML = `
    <h3>義援金を受け取ります</h3>
    <p>カードを1枚選んでください</p>
    <button id="reliefFlood">治水カード</button>
    <button id="reliefVillage">集落カード</button>
  `

  document.body.appendChild(overlay)
  document.body.appendChild(box)

  document.getElementById("reliefFlood").onclick = ()=>{}
  document.getElementById("reliefVillage").onclick = ()=>{}
  // =========================
  // 治水カード
  // =========================
  document.getElementById("reliefFlood").onclick = async ()=>{

      if(reliefProcessing) return
  reliefProcessing = true

    const snap = await get(ref(db,"rooms/"+roomId+"/state"))
    const newState = snap.val()
   if(!newState.relief || newState.reliefDone){
  console.log("すでに義援金処理済み")
  return
}

    newState.hands[playerNumber-1] ??= []

    if(!newState.buildDeck || newState.buildDeck.length === 0){
      newState.logs.unshift("建設カードデッキが尽きた")
    }else{
      const card = newState.buildDeck.pop()
      newState.hands[playerNumber-1].push(card)
      newState.logs.unshift("義援金：" + card.name + "を獲得")
    }

    newState.relief = null
    newState.reliefDone = true   // ←追加
 // =========================
  // 次のスタートプレイヤー決定
  // =========================
  if(newState.reliefDone){
    const reliefIndex = state.sideOrder.indexOf(newState.reliefPlayer)
newState.currentPlayer = reliefIndex + 1
  }else{
    newState.currentPlayer = newState.lastPlayer || 1
  }

    newState.phase = "build"

    await set(ref(db,"rooms/"+roomId+"/state"),newState)

    document.querySelector(".reliefBox")?.remove()
    document.querySelector(".reliefOverlay")?.remove()
      reliefProcessing = false  // ←ここ！！
  }

  // =========================
  // 集落カード
  // =========================
  document.getElementById("reliefVillage").onclick = async ()=>{

    if(reliefProcessing) return
reliefProcessing = true

    const snap = await get(ref(db,"rooms/"+roomId+"/state"))
    const newState = snap.val()
 if(!newState.relief || newState.reliefDone){
  console.log("すでに義援金処理済み")
  return
}
    newState.hands[playerNumber-1] ??= []
    newState.hands[playerNumber-1].push({name:"集落", point:0})

    newState.logs.unshift("義援金：集落カードを獲得")
    newState.relief = null
    newState.reliefDone = true  
 // =========================
  // 次のスタートプレイヤー決定
  // =========================
  if(newState.reliefDone){
   const reliefIndex = state.sideOrder.indexOf(newState.reliefPlayer)
newState.currentPlayer = reliefIndex + 1
  }else{
    newState.currentPlayer = newState.lastPlayer || 1
  }

    newState.phase = "build"

    await set(ref(db,"rooms/"+roomId+"/state"),newState)

    document.querySelector(".reliefBox")?.remove()
    document.querySelector(".reliefOverlay")?.remove()
      reliefProcessing = false  // ←ここ！！
  }
}
function showWaitingMessage(){

   if(state.reliefPlayer === ("p" + playerNumber)){
    return
  }

  const div = document.createElement("div")
  div.className = "reliefWait"
  div.innerText = "相手が義援金を選択中です..."

  document.body.appendChild(div)
}

</script>
