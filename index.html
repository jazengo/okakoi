<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>御囲堤ゲーム</title>

<script type="module">

import { 
 initializeApp 
} from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";

import { 
 getDatabase, ref, set, onValue, get, remove, onDisconnect 
} from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

/* -----------------------------
 Firebase
----------------------------- */

const firebaseConfig = {
 apiKey: "AIzaSyC9tAyMDg-vWo2HacWRV3zODrfqIIoNHuw",
 authDomain: "okakoi.firebaseapp.com",
 databaseURL: "https://okakoi-default-rtdb.firebaseio.com",
 projectId: "okakoi",
 storageBucket: "okakoi.firebasestorage.app",
 messagingSenderId: "359327536081",
 appId: "1:359327536081:web:5e4c85e194f935a01bc6f0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* -----------------------------
 基本設定
----------------------------- */

const DISTRICTS = 7

const params = new URLSearchParams(location.search)
let roomId = params.get("room")

if(!roomId){
 roomId = Math.random().toString(36).substring(2,8)
 location.search="?room="+roomId
}

let playerId = Math.random().toString(36).substring(2,10)
let playerNumber = null

let selectedCard = null
let state = null

let westBank
let eastBank
let handDiv
let turnDisplay
let playerSideDisplay

/* -----------------------------
 DOM準備
----------------------------- */

document.addEventListener("DOMContentLoaded",()=>{

 westBank=document.getElementById("westBank")
 eastBank=document.getElementById("eastBank")
 handDiv=document.getElementById("hand")
 turnDisplay=document.getElementById("turnDisplay")
playerSideDisplay=document.getElementById("playerSide")
 drawEmptyBoard()

  //set(ref(db,"rooms/"+roomId+"/state"),null)  // ←ページを開いたときにstateをリセット

listenPlayers()
listenState()
})

/* -----------------------------
 プレイヤー入室
----------------------------- */

function listenPlayers(){

 onValue(ref(db,"rooms/"+roomId+"/players"), async snap => {

  const players = snap.val() || {}

  /* -----------------------------
     プレイヤー0人 → ルーム削除
  ----------------------------- */

  if(!players.p1 && !players.p2){
   console.log("プレイヤー0人 → ルーム削除")
   remove(ref(db,"rooms/"+roomId))
   return
  }

  /* -----------------------------
     p1 入室
  ----------------------------- */

  if(!players.p1){

   await set(ref(db,"rooms/"+roomId+"/players/p1"),playerId)

   onDisconnect(ref(db,"rooms/"+roomId+"/players/p1")).remove()

   playerNumber=1
   return
  }

  /* -----------------------------
     p2 入室
  ----------------------------- */

  if(!players.p2 && players.p1!==playerId){

   await set(ref(db,"rooms/"+roomId+"/players/p2"),playerId)

   onDisconnect(ref(db,"rooms/"+roomId+"/players/p2")).remove()

   playerNumber=2
   return
  }

  /* -----------------------------
     既存プレイヤー判定
  ----------------------------- */

  if(players.p1===playerId) playerNumber=1
  if(players.p2===playerId) playerNumber=2

  /* -----------------------------
     UI更新
  ----------------------------- */

  if(playerNumber){
   renderHand()
   updatePlayerSide()
  }

  /* -----------------------------
     ゲーム開始
  ----------------------------- */

  if(players.p1 && players.p2 && playerNumber===1){

   get(ref(db,"rooms/"+roomId+"/state")).then(snap=>{
    if(!snap.exists()){
     tryStartGame()
    }
   })

  }

 })

}
/* -----------------------------
 ゲーム開始
----------------------------- */

async function tryStartGame(){

 const snap = await get(ref(db,"rooms/"+roomId+"/state"))

 if(snap.exists()) return
 if(playerNumber!==1) return

 const deck=createDeck()

 const newState={

  phase:"build",
  started:true,
  districts:createDistricts(),
  hands:createHands(deck),
  floodDeck:deck,
  currentPlayer:1,
  round:1

 }

 console.log("ゲーム開始", newState)
 set(ref(db,"rooms/"+roomId+"/state"),newState).then(()=>{
 console.log("state saved")
})

 
}

/* -----------------------------
 state同期
----------------------------- */

function listenState(){

 console.log("listenState start")

 const stateRef = ref(db,"rooms/"+roomId+"/state")

 onValue(stateRef,snap=>{

const s = snap.val()

if(!s || !s.districts){
 console.log("state未完成")
 return
}

state = s

  console.log("state received")

  drawBoard()
  renderHand()
  updateTurnDisplay()
  updatePlayerSide()

 })

}

/* -----------------------------
 地区生成
----------------------------- */

function drawEmptyBoard(){

 westBank.innerHTML=""
 eastBank.innerHTML=""

 for(let i=0;i<DISTRICTS;i++){

  const w=document.createElement("div")
  const e=document.createElement("div")

  w.className="district"
  e.className="district"

  const titleW=document.createElement("div")
  const titleE=document.createElement("div")

  titleW.className="title"
  titleE.className="title"

  titleW.innerText="地区"+(i+1)
  titleE.innerText="地区"+(i+1)

  const areaW=document.createElement("div")
  const areaE=document.createElement("div")

  areaW.className="cardArea"
  areaE.className="cardArea"

  w.appendChild(titleW)
  w.appendChild(areaW)

  e.appendChild(titleE)
  e.appendChild(areaE)

  westBank.appendChild(w)
  eastBank.appendChild(e)
 }
}

/* -----------------------------
 データ生成
----------------------------- */

function createDistricts(){

 const arr=[]

 for(let i=0;i<DISTRICTS;i++){
  arr.push({p1:[],p2:[]})
 }

 return arr
}

function createDeck(){

 const deck=[]

 function add(name,point,count){
  for(let i=0;i<count;i++){
   deck.push({name,point})
  }
 }

 add("ハザードマップ",1,24)
 add("水門",2,18)
 add("堤防",3,13)
 add("ダム",4,8)

 deck.sort(()=>Math.random()-0.5)

 return deck
}

function drawFlood(deck){
 return deck.pop()
}

function drawVillage(){
 return {name:"集落",point:0}
}

function createHands(deck){

 const hands=[[],[]]

 for(let p=0;p<2;p++){

  for(let i=0;i<4;i++)
   hands[p].push(drawFlood(deck))

  for(let i=0;i<3;i++)
   hands[p].push(drawVillage())

 }

 return hands
}

/* -----------------------------
 スコア
----------------------------- */

function score(cards){

 if(!Array.isArray(cards)) return 0

 return cards.reduce((a,c)=>a+(c?.point||0),0)

}

/* -----------------------------
 ボード描画
----------------------------- */

function drawBoard(){

 if(!state) return

 /* -------------------------
    districts取得
 ------------------------- */

 let districts = state.districts

 if(!districts){
  console.log("districts missing → 再生成")
  districts = createDistricts()
 }

 // Firebase配列対策
 if(!Array.isArray(districts)){
  districts = Object.values(districts)
 }

 state.districts = districts

 /* -------------------------
    ボード初期化
 ------------------------- */

 westBank.innerHTML=""
 eastBank.innerHTML=""

 for(let i=0;i<DISTRICTS;i++){

  const d = districts[i] || {p1:[],p2:[]}

  const w=document.createElement("div")
  const e=document.createElement("div")

  w.className="district"
  e.className="district"

  /* -------------------------
     タイトル
  ------------------------- */

  const titleW=document.createElement("div")
  const titleE=document.createElement("div")

  titleW.className="title"
  titleE.className="title"

  titleW.innerText="地区"+(i+1)
  titleE.innerText="地区"+(i+1)

  /* -------------------------
     カードエリア
  ------------------------- */

  const cardsW=document.createElement("div")
  const cardsE=document.createElement("div")

  cardsW.className="cardArea"
  cardsE.className="cardArea"

  if(playerNumber===state.currentPlayer){
   cardsW.style.cursor="pointer"
   cardsE.style.cursor="pointer"
  }

  /* -------------------------
     クリック
  ------------------------- */

  cardsW.onclick=()=>{

   console.log("west clicked",i)

   if(playerNumber!==1){
    console.log("西岸はp1のみ")
    return
   }

   build(i)

  }

  cardsE.onclick=()=>{

   console.log("east clicked",i)

   if(playerNumber!==2){
    console.log("東岸はp2のみ")
    return
   }

   build(i)

  }

  /* -------------------------
     カード表示
  ------------------------- */

  if(Array.isArray(d.p1)){
   d.p1.forEach(c=>{
    const card=document.createElement("div")
    card.className="cardSmall west"
    card.innerText=c?.point ?? ""
    cardsW.appendChild(card)
   })
  }

  if(Array.isArray(d.p2)){
   d.p2.forEach(c=>{
    const card=document.createElement("div")
    card.className="cardSmall east"
    card.innerText=c?.point ?? ""
    cardsE.appendChild(card)
   })
  }

  /* -------------------------
     スコア
  ------------------------- */

  const scoreW=document.createElement("div")
  const scoreE=document.createElement("div")

  scoreW.className="score"
  scoreE.className="score"

  scoreW.innerText="西岸:"+score(d.p1)
  scoreE.innerText="東岸:"+score(d.p2)

  /* -------------------------
     組み立て
  ------------------------- */

  w.appendChild(titleW)
  w.appendChild(cardsW)
  w.appendChild(scoreW)

  e.appendChild(titleE)
  e.appendChild(cardsE)
  e.appendChild(scoreE)

  westBank.appendChild(w)
  eastBank.appendChild(e)

 }

 updateTurnDisplay()

 console.log("drawBoard called")

}
/* -----------------------------
 手札描画
----------------------------- */

function renderHand(){

if(!state) return
if(!playerNumber) return
if(!state.hands) return

 handDiv.innerHTML=""

if(!state.hands) return
const hand=state.hands[playerNumber-1]
if(!Array.isArray(hand)) return

 if(!hand) return

 hand.forEach((c,i)=>{

  const d=document.createElement("div")

  d.className="handCard"

  if(i===selectedCard)
   d.classList.add("selected")

  d.innerHTML=c.name+"<br>"+c.point

  d.onclick=()=>{

   selectedCard=i
   renderHand()

  }

  handDiv.appendChild(d)

 })

}

/* -----------------------------
 ターン表示
----------------------------- */

function updateTurnDisplay(){

 if(!state) return

 if(state.currentPlayer===1){
  turnDisplay.innerText="西"
  turnDisplay.className="turnWest"
 }else{
  turnDisplay.innerText="東"
  turnDisplay.className="turnEast"
 }

}
function updatePlayerSide(){

 if(!playerNumber) return

 if(playerNumber===1){
  playerSideDisplay.innerText="あなたは西岸プレイヤー"
 }else{
  playerSideDisplay.innerText="あなたは東岸プレイヤー"
 }

}

/* -----------------------------
 カード配置
----------------------------- */
function build(i){
   console.log("state=",state)

 console.log(
  "build clicked",
  "player:", playerNumber,
  "turn:", state?.currentPlayer,
  "selected:", selectedCard
 )

 /* -------------------------
    基本チェック
 ------------------------- */

 if(!state){
  console.log("stateなし")
  return
 }

 if(playerNumber !== state.currentPlayer){
  console.log("自分のターンではない")
  return
 }

 if(selectedCard === null){
  console.log("カード未選択")
  return
 }

 /* -------------------------
    stateコピー
 ------------------------- */

const newState = {...state}

 /* -------------------------
    districts安全化
 ------------------------- */

let districts = newState.districts

if(!districts){
 districts=createDistricts()
}

if(!Array.isArray(districts)){
 districts = Object.values(districts)
}

newState.districts = districts
 /* -------------------------
    hands安全化
 ------------------------- */

let hands = newState.hands

if(!hands){
 console.log("hands missing")
 return
}

if(!Array.isArray(hands)){
 hands = Object.values(hands)
}

newState.hands = hands

 const hand = newState.hands[playerNumber-1]

 if(!hand){
  console.log("handなし")
  return
 }

 if(selectedCard >= hand.length){
  console.log("手札indexエラー")
  return
 }

 /* -------------------------
    district安全化
 ------------------------- */

if(!newState.districts[i]){
 console.log("district missing → 再生成",i)
 newState.districts[i]={p1:[],p2:[]}
}

 if(!newState.districts[i].p1){
  newState.districts[i].p1=[]
 }

 if(!newState.districts[i].p2){
  newState.districts[i].p2=[]
 }

 /* -------------------------
    カード取り出し
 ------------------------- */

 const card = hand.splice(selectedCard,1)[0]

 if(!card){
  console.log("card missing")
  return
 }

 /* -------------------------
    配置
 ------------------------- */

 const side = playerNumber === 1 ? "p1" : "p2"

 newState.districts[i][side].push(card)

 console.log("カード配置",card)

 /* -------------------------
    ターン交代
 ------------------------- */

 newState.currentPlayer = playerNumber === 1 ? 2 : 1

 selectedCard = null

 /* -------------------------
    Firebase保存
 ------------------------- */

 set(ref(db,"rooms/"+roomId+"/state"), newState)

}
</script>



<style>
  .villageHighlight{
outline:4px solid gold;
background:#fff7cc;
transform:scale(1.2);
box-shadow:0 0 6px gold;
}

body{
margin:0;
font-family:sans-serif;
background:#dff2ff;
text-align:center;
}

#container{
display:grid;
grid-template-columns:1fr 140px 1fr 260px;
gap:6px;
padding:6px;

height:600px;
}

.bank{
display:flex;
flex-direction:column;
gap:8px;
overflow-y:auto;
}

.district{
background:#eaffea;
border:3px solid #333;
border-radius:12px;
padding:6px;
min-height:130px;
display:flex;
flex-direction:column;
gap:4px;
}

.flooded{
background:#b9e3ff;
}

.title{
font-weight:bold;
font-size:12px;
}

.score{
font-size:22px;
font-weight:bold;
color:#222;
}

.cardSmall{
display:inline-block;
width:40px;
height:24px;
border-radius:6px;
margin:1px;
font-size:12px;
font-weight:bold;
color:white;
line-height:24px;

pointer-events:none;
}

.east{background:#d33}
.west{background:#2d6cdf}

.cardHiddenEast{
width:40px;
height:12px;
background:#ffb3b3;
margin:1px;
border-radius:3px;
}

.cardHiddenWest{
width:40px;
height:12px;
background:#b7ccff;
margin:1px;
border-radius:3px;
}

.villageHighlight{
outline:3px solid gold;
transform:scale(1.15);
}

#river{
background:linear-gradient(90deg,#4fb0ff,#1e78d7);
border-radius:40px;
}

.handCard{
display:inline-block;
background:white;
border:3px solid #333;
border-radius:12px;
width:110px;
height:140px;
margin:6px;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.selected{
outline:4px solid orange;
}

#log{
background:white;
border:2px solid #333;
border-radius:10px;
padding:4px;
height:420px;
overflow:auto;
font-size:13px;
text-align:left;
}

#aidPanel{
margin-top:6px;
}

.aidButton{
padding:8px 16px;
margin:4px;
font-size:16px;
cursor:pointer;
}

.loserEast{
border:4px solid red;
box-shadow:0 0 10px red;
}

.loserWest{
border:4px solid blue;
box-shadow:0 0 10px blue;
}
#turnDisplay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
font-weight:bold;
pointer-events:none;
}

.turnEast{
color:#1e78d7;
}

.turnWest{
color:#d33;
}

#river{
position:relative;
background:linear-gradient(90deg,#4fb0ff,#1e78d7);
border-radius:40px;
}
#victoryScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:48px;
color:white;
z-index:1000;
}

#victoryText{
margin-bottom:30px;
}

#victoryScreen button{
font-size:24px;
padding:12px 30px;
cursor:pointer;
}
#scoreTable{
background:white;
border:2px solid #333;
border-radius:10px;
padding:8px;
margin-top:6px;
font-size:14px;
text-align:left;
}

#scoreTable div{
padding:2px 0;
}
.cardArea{
min-height:70px;
border:3px dashed #444;
border-radius:8px;
padding:8px;
margin:6px 0;
background:#ffffff;
display:flex;
flex-wrap:wrap;
gap:4px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>御囲堤ゲーム</h1>
<h2 id="playerSide"></h2>

<div id="container">

<div class="bank" id="westBank"></div>

<div id="river">
  <div id="turnDisplay"></div>
</div>

<div class="bank" id="eastBank"></div>

<div>

<h3>履歴</h3>
<div id="log"></div>

<div id="aidPanel"></div>

<h3>建物の強さ</h3>
<div id="scoreTable">

<div>🗺 ハザードマップ　1点</div>
<div>🚪 水門　　　　　2点</div>
<div>🧱 堤防　　　　　3点</div>
<div>🏞 ダム　　　　　4点</div>
<div>🏠 集落　　　　　0点</div>

</div>

</div>

</div>

<h3>手札</h3>
<div id="hand"></div>



<div id="victoryScreen">
<div id="victoryText"></div>
<button onclick="location.reload()">もう一度遊ぶ</button>
</div>

</body>
</html>
